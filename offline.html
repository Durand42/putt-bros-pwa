<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putt Bros — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e14;
    color: #e8f0f8;
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  img { width: 100px; height: 100px; border-radius: 22px; margin-bottom: 8px; }
  h1 { font-size: 1.4rem; color: #7b2fff; letter-spacing: 2px; text-transform: uppercase; }
  p  { font-size: 0.85rem; color: #5a7080; max-width: 260px; line-height: 1.6; }
  button {
    margin-top: 8px;
    background: #7b2fff;
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <img src="/icons/icon-192x192.png" alt="Putt Bros">
  <h1>Putt Bros</h1>
  <p>You're offline. Connect to the internet to load the fantasy league.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
