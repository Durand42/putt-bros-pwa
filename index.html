<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Putt Bros" />
  <meta name="theme-color" content="#7b2fff" />
  <meta name="description" content="Putt Bros DGPT Fantasy League" />

  <title>Putt Bros</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />

  <!-- Apple splash screens (covers common iPhone sizes) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e14;
    }

    /* Splash screen shown while iframe loads */
    #splash {
      position: fixed;
      inset: 0;
      background: #0a0e14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #splash img {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      box-shadow: 0 0 40px rgba(123, 47, 255, 0.5), 0 0 80px rgba(0, 255, 157, 0.15);
      animation: pulse 2s ease-in-out infinite;
    }

    #splash h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #7b2fff, #00ff9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #splash p {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: #5a7080;
      text-transform: uppercase;
    }

    .loader {
      width: 40px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #7b2fff, #00ff9d);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 40px rgba(123,47,255,0.5), 0 0 80px rgba(0,255,157,0.15); }
      50%       { transform: scale(1.04); box-shadow: 0 0 60px rgba(123,47,255,0.7), 0 0 100px rgba(0,255,157,0.25); }
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* The Streamlit iframe — full screen */
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* Safe area insets for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Install banner for iOS (since iOS doesn't auto-prompt) */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, rgba(123,47,255,0.95), rgba(10,14,20,0.98));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px 24px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(123,47,255,0.3);
      z-index: 200;
      text-align: center;
    }
    #install-banner p {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: #e8f0f8;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    #install-banner span { color: #00ff9d; }
    #install-banner-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none; border: none;
      color: #5a7080; font-size: 1.1rem; cursor: pointer;
    }
  </style>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <img src="/icons/icon-192x192.png" alt="Putt Bros" />
    <h1>PUTT BROS</h1>
    <p>DGPT Fantasy League</p>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>

  <!-- iOS install hint banner -->
  <div id="install-banner">
    <button id="install-banner-close" aria-label="Close">✕</button>
    <p>Install <span>Putt Bros</span> on your home screen!<br>
    Tap <span>Share ↑</span> then <span>"Add to Home Screen"</span></p>
  </div>

  <!-- Streamlit app -->
  <iframe
    id="app-frame"
    src="https://putt-boysdgptfantasyleague.streamlit.app/?embedded=true"
    title="Putt Bros Fantasy League"
    allow="clipboard-read; clipboard-write"
  ></iframe>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered', reg.scope))
          .catch(err => console.warn('SW failed', err));
      });
    }

    // Hide splash when iframe loads (or after 4s max)
    const splash = document.getElementById('splash');
    const frame  = document.getElementById('app-frame');
    const hideSplash = () => splash.classList.add('hidden');

    frame.addEventListener('load', () => setTimeout(hideSplash, 600));
    setTimeout(hideSplash, 4000); // fallback

    // iOS install banner — show once if not in standalone mode
    const isIOS        = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true;
    const dismissed    = localStorage.getItem('install-dismissed');

    if (isIOS && !isStandalone && !dismissed) {
      setTimeout(() => {
        document.getElementById('install-banner').style.display = 'block';
      }, 3000);
    }

    document.getElementById('install-banner-close').addEventListener('click', () => {
      document.getElementById('install-banner').style.display = 'none';
      localStorage.setItem('install-dismissed', '1');
    });

    // Android/Chrome — intercept beforeinstallprompt for custom UX if desired
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); // let browser handle it naturally via address bar
    });
  </script>

</body>
</html>
