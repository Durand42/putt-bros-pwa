<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Putt Bros" />
  <meta name="theme-color" content="#7b2fff" />
  <title>Putt Bros</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0e14; overflow: hidden; }

    #login-screen {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: #0a0e14; z-index: 300; padding: 24px;
    }
    #login-screen img {
      width: 110px; height: 110px; border-radius: 24px; margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(123,47,255,0.5), 0 0 80px rgba(0,255,157,0.15);
      animation: pulse 2.5s ease-in-out infinite;
    }
    #login-screen h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 6px;
      background: linear-gradient(135deg, #fff 30%, #00ff9d 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 4px;
    }
    .sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #5a7080; text-transform: uppercase; margin-bottom: 32px; }
    #login-card { background: #0d1117; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 28px 24px; width: 100%; max-width: 340px; text-align: center; }
    .lock { font-size: 1.8rem; margin-bottom: 10px; }
    .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #5a7080; text-transform: uppercase; margin-bottom: 16px; }
    #pwd-input {
      width: 100%; padding: 12px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #e8f0f8; font-family: 'DM Mono', monospace; font-size: 14px;
      outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 2px;
    }
    #pwd-input:focus { border-color: rgba(123,47,255,0.5); }
    #login-btn {
      width: 100%; padding: 13px; border-radius: 8px;
      background: linear-gradient(135deg, #7b2fff, #5a1fd1);
      border: none; color: #fff; font-family: 'DM Mono', monospace;
      font-size: 13px; letter-spacing: 2px; cursor: pointer; transition: opacity 0.2s;
    }
    #login-btn:active { opacity: 0.8; }
    #login-error { font-family: 'DM Mono', monospace; font-size: 11px; color: #ff4444; margin-top: 10px; display: none; }

    #splash {
      position: fixed; inset: 0; background: #0a0e14;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 200; transition: opacity 0.5s ease;
    }
    #splash img { width: 120px; height: 120px; border-radius: 26px; box-shadow: 0 0 40px rgba(123,47,255,0.5); animation: pulse 2s ease-in-out infinite; }
    #splash h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 6px; background: linear-gradient(135deg, #7b2fff, #00ff9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    #splash p { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 3px; color: #5a7080; text-transform: uppercase; }
    .loader { width: 40px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .loader-bar { height: 100%; width: 40%; background: linear-gradient(90deg, #7b2fff, #00ff9d); border-radius: 2px; animation: slide 1.4s ease-in-out infinite; }
    #splash.hidden { opacity: 0; pointer-events: none; }

    @keyframes pulse {
      0%,100% { transform:scale(1);     box-shadow:0 0 40px rgba(123,47,255,0.5),0 0 80px rgba(0,255,157,0.15); }
      50%      { transform:scale(1.04); box-shadow:0 0 60px rgba(123,47,255,0.7),0 0 100px rgba(0,255,157,0.25); }
    }
    @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

    #app-frame { position: fixed; inset: 0; width: 100%; height: 100%; border: none; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

    #install-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(135deg, rgba(123,47,255,0.95), rgba(10,14,20,0.98));
      backdrop-filter: blur(12px); padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(123,47,255,0.3); z-index: 400; text-align: center;
    }
    #install-banner p { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: #e8f0f8; line-height: 1.6; margin-bottom: 12px; }
    #install-banner span { color: #00ff9d; }
    #install-banner-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #5a7080; font-size: 1.1rem; cursor: pointer; }
  </style>
</head>
<body>

  <div id="login-screen">
    <img src="/icons/icon-192x192.png" alt="Putt Bros">
    <h1>PUTT BROS</h1>
    <div class="sub">🥏 2026 MPO Fantasy League</div>
    <div id="login-card">
      <div class="lock">🔒</div>
      <div class="label">League Access Required</div>
      <input id="pwd-input" type="password" placeholder="Enter league password" autocomplete="current-password" />
      <button id="login-btn">🔓 ENTER LEAGUE</button>
      <div id="login-error">Incorrect password. Ask your commissioner.</div>
    </div>
  </div>

  <div id="splash">
    <img src="/icons/icon-192x192.png" alt="Putt Bros">
    <h1>PUTT BROS</h1>
    <p>DGPT Fantasy League</p>
    <div class="loader"><div class="loader-bar"></div></div>
  </div>

  <div id="install-banner">
    <button id="install-banner-close" aria-label="Close">✕</button>
    <p>Install <span>Putt Bros</span> on your home screen!<br>
    Tap <span>Share ↑</span> then <span>"Add to Home Screen"</span></p>
  </div>

  <iframe id="app-frame" src="" title="Putt Bros Fantasy League" allow="clipboard-read; clipboard-write"></iframe>

  <script>
    const STREAMLIT_URL = 'https://putt-boysdgptfantasyleague.streamlit.app/?embedded=true';
    const SITE_PASSWORD = 'puttbros'; // ← update this to match your SITE_PASSWORD secret

    const loginScreen = document.getElementById('login-screen');
    const splash      = document.getElementById('splash');
    const frame       = document.getElementById('app-frame');
    const pwdInput    = document.getElementById('pwd-input');
    const loginBtn    = document.getElementById('login-btn');
    const loginError  = document.getElementById('login-error');

    const isAuthed = () => localStorage.getItem('pb_authed') === '1';

    function showLogin() {
      splash.style.display = 'none';
      loginScreen.style.display = 'flex';
    }

    function loadApp() {
      loginScreen.style.display = 'none';
      splash.style.display = 'flex';
      frame.src = STREAMLIT_URL;
    }

    // Check auth on load
    if (isAuthed()) {
      loadApp();
    } else {
      showLogin();
    }

    // Login handler
    function attemptLogin() {
      if (pwdInput.value === SITE_PASSWORD) {
        localStorage.setItem('pb_authed', '1');
        loginError.style.display = 'none';
        loadApp();
      } else {
        loginError.style.display = 'block';
        pwdInput.value = '';
        pwdInput.focus();
      }
    }
    loginBtn.addEventListener('click', attemptLogin);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

    // Hide splash when Streamlit loads
    frame.addEventListener('load', () => {
      if (frame.src) setTimeout(() => splash.classList.add('hidden'), 800);
    });
    setTimeout(() => splash.classList.add('hidden'), 5000);

    // Logout signal from Streamlit via postMessage
    window.addEventListener('message', function(e) {
      if (!e.origin.includes('streamlit.app')) return;
      if (e.data === 'pb_logout') {
        localStorage.removeItem('pb_authed');
        frame.src = '';
        splash.classList.remove('hidden');
        showLogin();
      }
    });

    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('SW failed', err));
    }

    // iOS install banner
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS && !window.navigator.standalone && !localStorage.getItem('install-dismissed')) {
      setTimeout(() => document.getElementById('install-banner').style.display = 'block', 3000);
    }
    document.getElementById('install-banner-close').addEventListener('click', () => {
      document.getElementById('install-banner').style.display = 'none';
      localStorage.setItem('install-dismissed', '1');
    });

    window.addEventListener('beforeinstallprompt', e => e.preventDefault());
  </script>

</body>
</html>
